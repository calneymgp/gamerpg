<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ilha de Elmsong — 64×64 · biomas, monstros e paper doll</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
/* --- HUD React (DOM) --- */
#hudReact {
  position: fixed; top: 64px; left: 12px; z-index: 15; width: 260px;
  background: linear-gradient(145deg, rgba(18,22,34,.92), rgba(28,20,44,.88));
  border: 1px solid rgba(255,215,106,.35); border-radius: 16px;
  padding: 12px 14px; color: #e8e6e0;
  box-shadow: 0 8px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter: blur(6px);
  font-family: system-ui, sans-serif;
}
#hudReact .top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
#hudReact .avatar {
  width: 38px; height: 38px; border-radius: 50%; flex: none;
  background: linear-gradient(135deg, #ffd76a, #e08a2e);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 18px; color: #3a2408;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,.25);
}
#hudReact .nome { font-weight: 700; font-size: 15px; color: #ffd76a; }
#hudReact .sub { font-size: 11px; opacity: .65; }
#hudReact .hpTrack {
  height: 14px; border-radius: 8px; background: #14101e; overflow: hidden;
  border: 1px solid rgba(0,0,0,.6); position: relative;
}
#hudReact .hpFill {
  height: 100%; border-radius: 8px;
  background: linear-gradient(180deg, #6ee7a0, #22c55e 60%, #15803d);
  transition: width .25s ease, background .3s;
}
#hudReact .hpFill.mid { background: linear-gradient(180deg, #fde68a, #f59e0b 60%, #b45309); }
#hudReact .hpFill.low { background: linear-gradient(180deg, #fca5a5, #ef4444 60%, #991b1b); }
#hudReact .hpNum {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px #000;
}
#hudReact .stats { display: flex; gap: 8px; margin-top: 9px; }
#hudReact .pill {
  flex: 1; display: flex; align-items: center; gap: 6px; justify-content: center;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
  border-radius: 10px; padding: 5px 8px; font-size: 13px; font-weight: 600;
}
/* --- seletor de HUD --- */
#hudSwitch {
  position: fixed; top: 172px; left: 12px; z-index: 15;
  display: flex; gap: 4px; background: rgba(10,12,18,.7);
  border: 1px solid rgba(255,255,255,.18); border-radius: 12px; padding: 3px;
}
#hudSwitch button {
  border: 0; background: transparent; color: #cfd6e4; cursor: pointer;
  font-size: 11.5px; padding: 5px 10px; border-radius: 9px; font-family: inherit;
}
#hudSwitch button.on { background: #ffd76a; color: #3a2408; font-weight: 700; }
#invToggle {
  position: fixed; top: 54px; right: 12px; z-index: 20;
  background: rgba(20,24,32,.85); color: #ffd76a;
  border: 1px solid rgba(255,255,255,.25); border-radius: 20px;
  padding: 8px 14px; font-size: 14px; cursor: pointer;
}
#inv {
  position: fixed; top: 100px; right: 12px; z-index: 20; width: 300px;
  background: rgba(16,19,26,.93); border: 1px solid rgba(255,255,255,.2);
  border-radius: 14px; padding: 14px; display: none;
  max-height: calc(100vh - 120px); overflow-y: auto;
}
#inv.open { display: block; }
#inv h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
  color: #9fb3d0; margin: 10px 0 8px; }
#inv h3:first-child { margin-top: 0; }
.slots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.slot {
  background: #232936; border: 2px solid #333c4e; border-radius: 10px;
  padding: 4px 2px 5px; cursor: pointer; text-align: center;
}
.slot:hover { border-color: #5a6b8c; }
.slot.sel { border-color: #ffd76a; background: #2e3242; }
.slot img { width: 40px; height: 40px; image-rendering: pixelated; margin-bottom: 2px; }
.slot span { display: block; font-size: 9.5px; color: #cfd6e4; }
@media (max-width: 640px) {
  #inv { width: 260px; }
  .slot img { width: 32px; height: 32px; }
}
</style>
</head>
<body>
<div class="hud">
  <a href="../">← Hub</a>
  <span class="chip"><b>64×64</b> · 4 biomas · 18 monstros · paper doll · montarias · bioma NEVE por IA</span>
  <span class="hint">WASD/setas · ataque automático ao aproximar · I abre inventário</span>
</div>
<button id="invToggle">🎒 Inventário</button>
<div id="inv">
  <h3>Personagem</h3>
  <div class="slots" id="slotsS"></div>
  <h3>Armas</h3>
  <div class="slots" id="slotsW"></div>
  <h3>Armaduras</h3>
  <div class="slots" id="slotsA"></div>
  <h3>Montarias</h3>
  <div class="slots" id="slotsM"></div>
</div>
<div id="hudReact"></div>
<div id="hudSwitch">
  <button data-h="react">React</button>
  <button data-h="pixellab">PixelLab ✦IA</button>
  <button data-h="kenney">Kenney CC0</button>
</div>
<div id="game"></div>
<script src="../vendor/react.production.min.js"></script>
<script src="../vendor/react-dom.production.min.js"></script>
<script>
// HUD em React puro (sem build): componente que escuta o evento 'hudchange' do jogo
(function () {
  const e = React.createElement;
  function Hud() {
    const [d, setD] = React.useState({ nome: 'Calney', hp: 100, hpMax: 100, gold: 125, idade: 10 });
    React.useEffect(() => {
      const sync = () => window.__hudData && setD(window.__hudData());
      window.addEventListener('hudchange', sync);
      sync();
      return () => window.removeEventListener('hudchange', sync);
    }, []);
    const f = d.hp / d.hpMax;
    const cls = 'hpFill' + (f <= 0.25 ? ' low' : f <= 0.5 ? ' mid' : '');
    return e(React.Fragment, null,
      e('div', { className: 'top' },
        e('div', { className: 'avatar' }, d.nome[0]),
        e('div', null,
          e('div', { className: 'nome' }, d.nome),
          e('div', { className: 'sub' }, 'Aventureiro de Elmsong'))),
      e('div', { className: 'hpTrack' },
        e('div', { className: cls, style: { width: (f * 100) + '%' } }),
        e('div', { className: 'hpNum' }, d.hp + ' / ' + d.hpMax)),
      e('div', { className: 'stats' },
        e('div', { className: 'pill' }, '🪙 ' + d.gold),
        e('div', { className: 'pill' }, '🎂 Idade ' + d.idade)));
  }
  ReactDOM.createRoot(document.getElementById('hudReact')).render(e(Hud));
})();
// seletor de HUD
window.__markHud = (name) => {
  document.querySelectorAll('#hudSwitch button').forEach(b =>
    b.classList.toggle('on', b.dataset.h === name));
};
document.querySelectorAll('#hudSwitch button').forEach(b =>
  b.onclick = () => window.__setHud && window.__setHud(b.dataset.h));
</script>
<script src="../vendor/phaser.min.js"></script>
<script src="../shared/engine.js?v=hud3"></script>
<script>
// inventário DOM — conversa com o jogo via window.__equip
const WEAPONS_UI = [
  ['longsword', 'Espada longa'], ['dagger', 'Adaga'], ['mace', 'Maça'],
  ['waraxe', 'Machado'], ['spear', 'Lança'],
];
const ARMORS_UI = [
  ['shirt', 'Camisa'], ['leather', 'Couro'], ['chain', 'Cota de malha'],
  ['legion', 'Legião'], ['plate', 'Placas'],
];
const MOUNTS_UI = [
  ['none', 'A pé', 'dismount'],
  ['marrom', 'Marrom', 'horse_marrom'], ['preto', 'Preto', 'horse_preto'],
  ['cinza', 'Cinza', 'horse_cinza'], ['dourado', 'Dourado', 'horse_dourado'],
  ['branco', 'Branco', 'horse_branco'], ['porco', 'Porco Rosa ✦', 'mount_porco'],
];
function buildSlots(elId, items, kind) {
  const el = document.getElementById(elId);
  for (const [id, label, icon] of items) {
    const b = document.createElement('div');
    b.className = 'slot';
    b.dataset.id = id;
    b.innerHTML = `<img src="../assets/64/ui/icons/${icon || id}.png" alt=""><span>${label}</span>`;
    b.onclick = () => {
      window.__equip && window.__equip(kind, id);
      el.querySelectorAll('.slot').forEach(s => s.classList.toggle('sel', s === b));
    };
    el.appendChild(b);
  }
}
buildSlots('slotsS', [['skin_lpc', 'Herói LPC'], ['skin_ai', 'Cavaleiro IA ✦']], 'skin');
buildSlots('slotsW', WEAPONS_UI, 'weapon');
buildSlots('slotsA', ARMORS_UI, 'armor');
buildSlots('slotsM', MOUNTS_UI, 'mount');
document.getElementById('invToggle').onclick = () =>
  document.getElementById('inv').classList.toggle('open');
window.__markEquipped = (kind, id) => {
  const el = document.getElementById(
    kind === 'weapon' ? 'slotsW' : kind === 'skin' ? 'slotsS' : kind === 'mount' ? 'slotsM' : 'slotsA');
  el.querySelectorAll('.slot').forEach(s => s.classList.toggle('sel', s.dataset.id === id));
};
addEventListener('keydown', e => {
  if (e.key === 'i' || e.key === 'I') document.getElementById('inv').classList.toggle('open');
});
</script>
<script src="game.js?v=hud3"></script>
</body>
</html>
